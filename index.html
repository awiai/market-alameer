<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ماركت الأمير</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,Arial;
}

body{
background:#f7f7f7;
color:#222;
}


/* الهيدر */

header{
background:#e60012;
color:white;
padding:15px;
position:sticky;
top:0;
z-index:10;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:24px;
font-weight:bold;
}

.cart{
background:white;
color:#e60012;
padding:8px 15px;
border-radius:20px;
}


/* البحث */

.search{
padding:15px;
background:white;
}

.search input{
width:100%;
padding:15px;
border-radius:25px;
border:1px solid #ddd;
font-size:17px;
}


/* البانر */

.banner{

margin:15px;
height:180px;
border-radius:20px;

background:
linear-gradient(
rgba(230,0,18,.8),
rgba(230,0,18,.8)
),
url("https://via.placeholder.com/900x400");

background-size:cover;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:30px;
font-weight:bold;
text-align:center;

}


/* الاقسام */

.title{
padding:15px;
font-size:22px;
font-weight:bold;
}


.categories{

display:flex;
overflow:auto;
gap:12px;
padding:0 15px;

}


.category{

background:white;
min-width:110px;
padding:20px 10px;
border-radius:15px;
text-align:center;
box-shadow:0 3px 10px #ddd;

}



/* المنتجات */

.products{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(160px,1fr));

gap:15px;
padding:15px;

}


.empty{

background:white;
padding:40px;
border-radius:20px;
text-align:center;
grid-column:1/-1;
color:#777;

}



/* السلة */

.cart-box{

position:fixed;
bottom:0;
right:0;
left:0;

background:white;

padding:15px;

box-shadow:0 -3px 15px #ccc;

display:flex;
justify-content:space-between;

}


button{

background:#e60012;
color:white;
border:none;
padding:12px 20px;
border-radius:20px;

}


</style>

</head>


<body>


<header>

<div class="top">

<div class="logo">
🛒 ماركت الأمير
</div>


<div class="cart">
🛒 0
</div>

</div>

</header>



<div class="search">

<input placeholder="ابحث عن منتج...">

</div>



<div class="banner">

عروض الأسبوع 🔥

</div>




<div class="title">
الأقسام
</div>


<div class="categories">


<div class="category">
🥤<br>
مشروبات
</div>


<div class="category">
🍎<br>
خضار وفواكه
</div>


<div class="category">
🥛<br>
ألبان
</div>


<div class="category">
🍞<br>
مخبوزات
</div>


<div class="category">
🧼<br>
منظفات
</div>


</div>




<div class="title">

المنتجات

</div>



<div class="products">


<div class="empty">

لا توجد منتجات حالياً<br>
سيتم إضافة المنتجات قريباً

</div>


</div>




<div class="cart-box">

<div>
السلة فارغة
</div>


<button>
إتمام الطلب
</button>


</div>



</body>
</html>
