<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ماركت الأمير</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#1b8f3d;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:15px;
border-radius:10px;
border:none;
font-size:18px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#1b8f3d;
font-size:20px;
margin:10px 0;
font-weight:bold;
}

button{
background:#1b8f3d;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:10px;
font-size:17px;
cursor:pointer;
}
</style>

</head>
<body>

<header>
🛒 ماركت الأمير
</header>

<div class="search">
<input type="text" placeholder="ابحث عن منتج...">
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>بيبسي</h3>
<div class="price">750 د.ع</div>
<button>إضافة للسلة</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>حليب</h3>
<div class="price">2000 د.ع</div>
<button>إضافة للسلة</button>
</div>

</div>

</body>
</html>
