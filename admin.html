<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة تحكم ماركت الأمير</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>🛒 ماركت الأمير</h1>

<p>لوحة تحكم المدير</p>

<input
type="password"
id="password"
placeholder="أدخل كلمة المرور">

<button id="loginBtn">
دخول
</button>

</div>

</div>

<div id="dashboard" style="display:none;">

<header>

<h2>لوحة التحكم</h2>

<div class="admin-info">

<span>👤 المدير</span>

<button id="logoutBtn">
تسجيل الخروج
</button>

</div>

</header>

<nav>

<button id="productsPage">📦 المنتجات</button>

<button id="ordersPage">🛒 الطلبات</button>

<button id="offersPage">🔥 العروض</button>

<button id="settingsPage">⚙️ الإعدادات</button>

</nav>

<main>
  <section id="products">

<h2>إضافة منتج جديد</h2>

<form id="productForm">

<input
type="text"
id="productName"
placeholder="اسم المنتج"
required>

<input
type="number"
id="productPrice"
placeholder="السعر"
required>

<textarea
id="productDescription"
placeholder="وصف المنتج"></textarea>

<select id="productCategory">

<option value="">اختر القسم</option>
<option value="مشروبات">مشروبات</option>
<option value="مواد غذائية">مواد غذائية</option>
<option value="ألبان">ألبان</option>
<option value="منظفات">منظفات</option>

</select>

<input
type="file"
id="productImage"
accept="image/*">

<button type="submit">
إضافة المنتج
</button>

</form>

<hr>

<h2>المنتجات</h2>

<div id="productsList">

لا توجد منتجات حتى الآن

</div>

</section>

</main>

<script type="module" src="./admin.js"></script>

</body>
</html>
