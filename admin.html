<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة تحكم ماركت الأمير</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="login-page">

<div class="login-box">

<h1>🛒 ماركت الأمير</h1>

<p>لوحة تحكم المدير</p>

<input
type="password"
id="password"
placeholder="كلمة المرور">

<button id="loginBtn">

دخول

</button>

</div>

</div>

<div id="dashboard" style="display:none;">

<header>

<h2>

لوحة التحكم

</h2>

<div class="admin-info">

<button id="logoutBtn">

تسجيل الخروج

</button>

</div>

</header>

<nav>

<button id="productsPage">
📦 المنتجات
</button>

<button id="ordersPage">
🛒 الطلبات
</button>

<button id="offersPage">
🔥 العروض
</button>

<button id="settingsPage">
⚙️ الإعدادات
</button>

</nav>

<main>

<section id="products">

<h2>إضافة منتج</h2>

<form id="productForm">

<input
id="productName"
type="text"
placeholder="اسم المنتج">

<input
id="productPrice"
type="number"
placeholder="السعر">

<select id="productCategory">

<option value="">اختر القسم</option>

<option>مشروبات</option>

<option>ألبان</option>

<option>منظفات</option>

<option>مواد غذائية</option>

</select>

<input
id="productImage"
type="file">

<button type="submit">

إضافة المنتج

</button>

</form>

<hr>

<div id="productsList">

لا توجد منتجات

</div>

</section>

</main>

<script type="module" src="admin.js"></script>

</body>

</html>
